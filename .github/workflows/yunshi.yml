name: Daily Wechat Push

on:
  schedule:
    # 每天 UTC 0 点运行（北京时间早上 8 点）
    - cron: '17 14 * * *'
  # 允许手动触发，方便测试
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你的代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装依赖（这里加了 schedule，如果还有其他库请继续追加）
      - name: Install dependencies
        run: |
          pip install requests schedule

      # 4. 运行你的脚本（并把所有输出，包括错误，都打印出来）
      - name: Run script
        run: |
          echo "===== 开始运行脚本 ====="
          python meiriyunshi.py 2>&1
          echo "===== 脚本运行结束 ====="
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
